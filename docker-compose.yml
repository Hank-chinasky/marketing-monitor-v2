version: "3.9"

services:
  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - creatorworkboard_data:/app/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz/', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=cc_public"
      - "traefik.http.routers.creatorworkboard-ops.rule=Host(`ops.creatorworkboard.com`)"
      - "traefik.http.routers.creatorworkboard-ops.entrypoints=websecure"
      - "traefik.http.routers.creatorworkboard-ops.tls=true"
      - "traefik.http.routers.creatorworkboard-ops.tls.certresolver=le"
      - "traefik.http.routers.creatorworkboard-ops.middlewares=traefik-auth@docker,security-headers@file"
      - "traefik.http.services.creatorworkboard-ops.loadbalancer.server.port=8000"
    networks:
      - app_net
      - cc_public

volumes:
  creatorworkboard_data:

networks:
  app_net:
    driver: bridge
  cc_public:
    external: true
