<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ material.label|default:material.filename }} — Preview</title>
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f172a;
            color: #f8fafc;
        }

        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 1rem 1.25rem;
            background: rgba(15, 23, 42, 0.96);
            border-bottom: 1px solid rgba(148, 163, 184, 0.25);
        }

        .toolbar-left {
            min-width: 0;
        }

        .toolbar-title {
            font-size: 1rem;
            font-weight: 700;
            margin: 0 0 0.15rem;
            word-break: break-word;
        }

        .toolbar-meta {
            margin: 0;
            color: #cbd5e1;
            font-size: 0.92rem;
        }

        .toolbar-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .toolbar-link {
            color: #e2e8f0;
            text-decoration: none;
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 999px;
            padding: 0.55rem 0.85rem;
            white-space: nowrap;
        }

        .toolbar-link:hover {
            background: rgba(148, 163, 184, 0.12);
        }

        .viewer {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .viewer img,
        .viewer video {
            display: block;
            max-width: 100%;
            max-height: calc(100vh - 6.5rem);
            width: auto;
            height: auto;
            border-radius: 12px;
            background: #020617;
            box-shadow: 0 12px 36px rgba(2, 6, 23, 0.4);
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="toolbar">
            <div class="toolbar-left">
                <p class="toolbar-title">{{ material.label|default:material.filename }}</p>
                <p class="toolbar-meta">{{ creator.display_name }} · {{ material.uploaded_at }}</p>
            </div>
            <div class="toolbar-actions">
                <a class="toolbar-link" href="{{ creator_detail_url }}">Terug naar materialen</a>
            </div>
        </div>

        <div class="viewer">
            {% if material.is_video %}
                <video controls autoplay>
                    <source src="{{ download_url }}" type="{{ material.mime_type }}">
                </video>
            {% else %}
                <img src="{{ download_url }}" alt="{{ material.label|default:material.filename }}">
            {% endif %}
        </div>
    </div>
</body>
</html>
