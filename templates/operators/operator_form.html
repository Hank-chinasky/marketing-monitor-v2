{% extends "base.html" %}

{% block content %}
<h1>Nieuwe operator</h1>
<p class="muted">Maak hier een nieuwe operator-user aan. Dit maakt zowel de Django user als het gekoppelde Operator record aan.</p>

<div class="panel">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="form-actions">
            <button class="primary-button" type="submit">Operator aanmaken</button>
        </div>
    </form>
</div>
{% endblock %}
